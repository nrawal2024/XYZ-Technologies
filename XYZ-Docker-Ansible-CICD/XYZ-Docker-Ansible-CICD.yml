pipeline {
    agent any

    tools {
        maven 'Maven'
    }

    stages {

        stage('Code Checkout') {
            steps {
                git 'https://github.com/nrawal2024/XYZ-Technologies.git'
            }
        }

        stage('Compile') {
            steps {
                sh 'mvn clean compile'
            }
        }

        stage('Test') {
            steps {
                sh 'mvn test'
            }
        }

        stage('Build') {
            steps {
                sh 'mvn package'
            }
        }

        stage('Prepare WAR') {
            steps {
                sh 'cp target/XYZtechnologies-1.0.war xyz_tech.war'
            }
        }

        stage('Deploy with Ansible') {
            steps {
                ansiblePlaybook(
                    credentialsId: 'myansible2',
                    inventory: '/var/lib/jenkins/workspace/Project02/Project02-XYZ-Technologiesnodes.inv',
                    playbook: '/var/lib/jenkins/workspace/Project02/Project02-XYZ-Technologies/deploy_docker_playbook.yml'
                )
            }
        }
    }
}
