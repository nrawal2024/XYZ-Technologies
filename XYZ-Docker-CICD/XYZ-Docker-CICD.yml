pipeline
{
    agent any

    tools {
        maven 'Maven'   // configure in Global Tool Config
    }

    stages
    {
        stage('Code Checkout')
        {
            steps
            {
                git 'https://github.com/nrawal2024/XYZ-Technologies.git'
            }
        }

        stage('Code Compile')
        {
            steps
            {
                sh 'mvn clean compile'
            }
        }

        stage('Test')
        {
            steps
            {
                sh 'mvn test'
            }
        }

        stage('Build')
        {
            steps
            {
                sh 'mvn package'
            }
        }

        stage('Install Docker using Ansible')
        {
            steps
            {
                echo "Docker already installed - skipping"
            }
        }

        stage('Prepare WAR file')
        {
            steps
            {
                sh 'cp target/*.war xyz.war'
            }
        }

        stage('Build Docker Image')
        {
            steps
            {
                sh 'docker build -t xyz_tech:$BUILD_NUMBER .'
                sh 'docker tag xyz_tech:$BUILD_NUMBER nrawal2024/xyz_tech:$BUILD_NUMBER'
            }
        }

        stage('Push Docker Image') {
          steps {
              script {
                  withDockerRegistry(credentialsId: 'dockerhub-creds', url: '') {
                      sh 'docker push nrawal2024/xyz_tech:9'
            }
        }
    }
}

        stage('Deploy Container')
        {
            steps
            {
                sh 'docker run -d -P nrawal2024/xyz_tech:$BUILD_NUMBER'
            }
        }
    }
}
