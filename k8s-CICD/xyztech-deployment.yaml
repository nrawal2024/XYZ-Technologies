apiVersion: apps/v1
kind: Deployment
metadata:
  name: xyztech-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xyztech-app
  template:
    metadata:
      labels:
        app: xyztech-app
    spec:
      containers:
      - name: xyztech-container
        image: nrawal2024/tech_app:v3
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: xyztech-service
spec:
  type: NodePort
  selector:
    app: xyztech-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30007
